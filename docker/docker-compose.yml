name: orggraph

services:
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: orggraph-api
    restart: unless-stopped
    environment:
      PORT: "3000"
      DATABASE_URL: file:/app/data/orggraph.db
      PERMISSIONS_FIXTURES_PATH: /app/fixtures/permissions
      USER_PROFILE_MAP_PATH: /app/fixtures/permissions/user-profile-map.json
      EVIDENCE_INDEX_PATH: /app/data/evidence/index.json
      REFRESH_STATE_PATH: /app/data/refresh/state.json
    ports:
      - "3100:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3000/ready', (r) => process.exit(r.statusCode===200?0:1)).on('error', () => process.exit(1));"
        ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    volumes:
      - ../data:/app/data
      - ../fixtures:/app/fixtures:ro

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    container_name: orggraph-web
    restart: unless-stopped
    environment:
      PORT: "3000"
      NEXT_PUBLIC_API_BASE: http://api:3000
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3101:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3000/api/ready', (r) => process.exit(r.statusCode===200?0:1)).on('error', () => process.exit(1));"
        ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s
