name: orggraph

services:
  postgres:
    image: postgres:16-alpine
    container_name: orggraph-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: orggraph
      POSTGRES_PASSWORD: orggraph
      POSTGRES_DB: orggraph
    volumes:
      - ../data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orggraph -d orggraph"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 15s

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: orggraph-api
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      ORGGRAPH_CONFIG_PATH: /app/config/api.docker.json
      PORT: "${PORT:-3000}"
    ports:
      - "3100:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3000/ready', (r) => process.exit(r.statusCode===200?0:1)).on('error', () => process.exit(1));"
        ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    volumes:
      - ../data:/app/data
      - ../config:/app/config:ro
      - ../fixtures:/app/fixtures:ro
      - ../manifest:/app/manifest:ro
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
      args:
        NEXT_PUBLIC_BUILD_VERSION: ${ORGGRAPH_WEB_VERSION:-dev-local}
    container_name: orggraph-web
    restart: unless-stopped
    environment:
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      NEXT_PUBLIC_API_BASE: http://api:3000
      ORGGRAPH_WEB_LOG_ENABLED: "true"
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3101:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3000/api/ready', (r) => process.exit(r.statusCode===200?0:1)).on('error', () => process.exit(1));"
        ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s
