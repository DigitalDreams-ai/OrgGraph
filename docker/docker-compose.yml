name: orggraph

services:
  postgres:
    image: postgres:16-alpine
    container_name: orggraph-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: orggraph
      POSTGRES_PASSWORD: orggraph
      POSTGRES_DB: orggraph
    ports:
      - "5432:5432"
    volumes:
      - ../data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orggraph -d orggraph"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 15s

  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: orggraph-api
    restart: unless-stopped
    environment:
      PORT: "3000"
      GRAPH_BACKEND: postgres
      DATABASE_URL: postgres://orggraph:orggraph@postgres:5432/orggraph
      PERMISSIONS_FIXTURES_PATH: /app/data/sf-project/force-app/main/default
      USER_PROFILE_MAP_PATH: /app/data/sf-user-principals.json
      EVIDENCE_INDEX_PATH: /app/data/evidence/index.json
      REFRESH_STATE_PATH: /app/data/refresh/state.json
      REFRESH_AUDIT_PATH: /app/data/refresh/audit.jsonl
      ONTOLOGY_REPORT_PATH: /app/data/refresh/ontology-report.json
      MIN_CONFIDENCE_DEFAULT: medium
      ASK_CONSISTENCY_CHECK_ENABLED: "true"
      SF_INTEGRATION_ENABLED: "false"
      SF_AUTH_MODE: sfdx_url
      SF_AUTH_URL_PATH: /app/.secrets/sandbox.sfdx-url.txt
      SF_ALIAS: orggraph-sandbox
      SF_BASE_URL: https://test.salesforce.com
      SF_PROJECT_PATH: /app/data/sf-project
      SF_MANIFEST_PATH: /app/manifest/package.xml
      SF_PARSE_PATH: /app/data/sf-project/force-app/main/default
      SF_WAIT_MINUTES: "15"
      SF_RETRY_COUNT: "2"
      SF_RETRY_DELAY_MS: "1500"
      SF_TIMEOUT_SECONDS: "900"
      SF_AUTO_REFRESH_AFTER_RETRIEVE: "true"
    ports:
      - "3100:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3000/ready', (r) => process.exit(r.statusCode===200?0:1)).on('error', () => process.exit(1));"
        ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s
    volumes:
      - ../data:/app/data
      - ../fixtures:/app/fixtures:ro
      - ../manifest:/app/manifest:ro
    depends_on:
      postgres:
        condition: service_healthy

  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    container_name: orggraph-web
    restart: unless-stopped
    environment:
      PORT: "3000"
      HOSTNAME: "0.0.0.0"
      NEXT_PUBLIC_API_BASE: http://api:3000
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3101:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://127.0.0.1:3000/api/ready', (r) => process.exit(r.statusCode===200?0:1)).on('error', () => process.exit(1));"
        ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s
