name: Scripts Lint

on:
  pull_request:
    paths:
      - 'scripts/**'
      - '.github/workflows/scripts-lint.yml'
  push:
    branches:
      - main
      - 'phase*'
    paths:
      - 'scripts/**'
      - '.github/workflows/scripts-lint.yml'

concurrency:
  group: scripts-lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: ./scripts

      - name: Enforce executable bit for shell scripts
        run: |
          bad="$(git ls-files -s scripts/*.sh | awk '$1 != \"100755\" {print $4}')"
          if [ -n "$bad" ]; then
            echo "Scripts missing executable bit:"
            echo "$bad"
            exit 1
          fi
