name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: '.github/requirements-cumulusci.txt'

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install Salesforce CLI
        shell: bash
        run: npm install --global @salesforce/cli

      - name: Install pinned CumulusCI
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade --force-reinstall -r .github/requirements-cumulusci.txt
          python -c "import pkg_resources"

      - name: Verify desktop prerequisites
        shell: bash
        run: |
          node --version
          pnpm --version
          sf --version
          cci version
          cargo --version
          rustc --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Test API
        run: pnpm --filter api test

      - name: Test project-memory MCP
        run: pnpm --filter @orgumented/project-memory-mcp test

      - name: Build API
        run: pnpm --filter api build

      - name: Build embedded UI
        run: pnpm --filter web build

      - name: Desktop readiness
        run: pnpm desktop:info

      - name: Build desktop shell
        shell: pwsh
        run: |
          $attempts = 3
          for ($attempt = 1; $attempt -le $attempts; $attempt++) {
            pnpm desktop:build
            if ($LASTEXITCODE -eq 0) {
              exit 0
            }

            if ($attempt -eq $attempts) {
              throw "pnpm desktop:build failed after $attempts attempts"
            }

            Write-Host "desktop:build failed on attempt $attempt. Retrying after transient bundle download error..."
            Start-Sleep -Seconds 20
          }

      - name: Upload packaged desktop runtime
        uses: actions/upload-artifact@v4
        with:
          name: desktop-packaged-runtime
          path: |
            apps/desktop/src-tauri/runtime/**
            apps/desktop/src-tauri/target/release/**
          if-no-files-found: error

  desktop-runtime-smoke:
    runs-on: windows-latest
    needs: [validate]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: '.github/requirements-cumulusci.txt'

      - name: Install Salesforce CLI
        shell: bash
        run: npm install --global @salesforce/cli

      - name: Install pinned CumulusCI
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade --force-reinstall -r .github/requirements-cumulusci.txt
          python -c "import pkg_resources"

      - name: Download packaged desktop runtime
        uses: actions/download-artifact@v4
        with:
          name: desktop-packaged-runtime
          path: apps/desktop/src-tauri

      - name: Run packaged desktop smoke
        run: pnpm desktop:smoke:release

      - name: Upload runtime artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-runtime-artifacts
          path: |
            logs/desktop-release-smoke*
            logs/desktop-phase4-release.log
          if-no-files-found: ignore
