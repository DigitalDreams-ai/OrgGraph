name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - 'wave-*'

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Salesforce CLI
        shell: bash
        run: npm install --global @salesforce/cli

      - name: Install pinned CumulusCI
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install setuptools
          pip install "cumulusci==4.5.0"

      - name: Verify desktop prerequisites
        shell: bash
        run: |
          node --version
          pnpm --version
          sf --version
          cci version
          cargo --version
          rustc --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Test API
        run: pnpm --filter api test

      - name: Test project-memory MCP
        run: pnpm --filter @orgumented/project-memory-mcp test

      - name: Build API
        run: pnpm --filter api build

      - name: Build embedded UI
        run: pnpm --filter web build

      - name: Desktop readiness
        run: pnpm desktop:info

      - name: Build desktop shell
        run: pnpm desktop:build

  desktop-runtime-smoke:
    runs-on: windows-latest
    needs: [validate]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Salesforce CLI
        shell: bash
        run: npm install --global @salesforce/cli

      - name: Install pinned CumulusCI
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install setuptools
          pip install "cumulusci==4.5.0"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start desktop development runtime
        shell: bash
        run: |
          mkdir -p artifacts
          ORGUMENTED_DESKTOP_API_PORT=3100 ORGUMENTED_DESKTOP_WEB_PORT=3101 node apps/desktop/scripts/dev-runtime.mjs > artifacts/desktop-runtime.log 2>&1 &
          echo $! > artifacts/desktop-runtime.pid

      - name: Wait for embedded UI and local engine
        shell: bash
        run: |
          for _ in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:3101/api/ready >/dev/null && curl -fsS http://127.0.0.1:3100/ready >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "desktop runtime did not become ready in time"
          exit 1

      - name: Run desktop-backed smoke checks
        shell: bash
        run: |
          ./scripts/web-smoke.sh
          ./scripts/phase14-drift-gate.sh artifacts/phase14-drift-gate.json

      - name: Upload runtime artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: desktop-runtime-artifacts
          path: artifacts/
          if-no-files-found: ignore

      - name: Stop desktop development runtime
        if: always()
        shell: bash
        run: |
          if [ -f artifacts/desktop-runtime.pid ]; then
            kill "$(cat artifacts/desktop-runtime.pid)" || true
          fi
