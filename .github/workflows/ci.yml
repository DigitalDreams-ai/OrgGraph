name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - phase2
      - phase4
      - phase5

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Test API
        run: pnpm --filter api test

      - name: Build API
        run: pnpm --filter api build

      - name: Build Web
        run: pnpm --filter web build

  web-smoke:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and start stack
        run: docker compose -f docker/docker-compose.yml up -d --build

      - name: Wait for services
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:3101/api/ready >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "services did not become ready in time"
          exit 1

      - name: Run web smoke checks
        run: ./scripts/web-smoke.sh

      - name: Capture compose logs
        if: failure()
        run: |
          mkdir -p artifacts
          docker compose -f docker/docker-compose.yml logs > artifacts/compose-logs.txt

      - name: Upload smoke artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: web-smoke-artifacts
          path: artifacts/

      - name: Stop stack
        if: always()
        run: docker compose -f docker/docker-compose.yml down -v
