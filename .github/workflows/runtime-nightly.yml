name: Runtime Nightly

on:
  schedule:
    - cron: '30 6 * * *'
  workflow_dispatch:

concurrency:
  group: runtime-nightly
  cancel-in-progress: true

jobs:
  nightly:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.12.3

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Salesforce CLI
        shell: bash
        run: npm install --global @salesforce/cli

      - name: Install pinned CumulusCI
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade --force-reinstall "setuptools==80.9.0"
          pip install "cumulusci==4.5.0"
          python -c "import pkg_resources"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packaged desktop runtime
        shell: pwsh
        run: |
          $attempts = 3
          for ($attempt = 1; $attempt -le $attempts; $attempt++) {
            pnpm desktop:build
            if ($LASTEXITCODE -eq 0) {
              exit 0
            }

            if ($attempt -eq $attempts) {
              throw "pnpm desktop:build failed after $attempts attempts"
            }

            Write-Host "desktop:build failed on attempt $attempt. Retrying after transient bundle download error..."
            Start-Sleep -Seconds 20
          }

      - name: Run packaged desktop smoke
        run: pnpm desktop:smoke:release

      - name: Upload nightly artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runtime-nightly-artifacts
          path: |
            logs/desktop-release-smoke*
            logs/desktop-phase4-release.log
          if-no-files-found: ignore
