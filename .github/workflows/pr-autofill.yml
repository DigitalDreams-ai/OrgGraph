name: PR Autofill

on:
  pull_request_target:
    types: [opened, reopened]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-autofill-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  autofill:
    runs-on: ubuntu-latest
    steps:
      - name: Populate PR title and description from commits
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- auto-pr-description -->';
            const pr = context.payload.pull_request;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const commits = await github.paginate(github.rest.pulls.listCommits, {
              owner,
              repo,
              pull_number: pr.number,
              per_page: 100
            });

            const subjects = commits
              .map((c) => (c.commit.message || '').split('\n')[0].trim())
              .filter((s) => s.length > 0 && !s.startsWith('Merge '));

            if (subjects.length === 0) {
              core.info('No commit subjects found; skipping autofill.');
              return;
            }

            const ccRegex = /^(?<type>[a-z]+)(\((?<scope>[^)]+)\))?(?<breaking>!)?:\s+(?<desc>.+)$/i;
            const parsed = subjects
              .map((s) => ({ raw: s, match: s.match(ccRegex) }))
              .map((item) => {
                if (!item.match || !item.match.groups) {
                  return { raw: item.raw };
                }
                return {
                  raw: item.raw,
                  type: item.match.groups.type.toLowerCase(),
                  scope: item.match.groups.scope,
                  desc: item.match.groups.desc,
                  breaking: Boolean(item.match.groups.breaking)
                };
              });

            const first = parsed[0];
            const generatedTitle = first.type
              ? `${first.type}${first.scope ? `(${first.scope})` : ''}: ${first.desc}`
              : first.raw;

            const typeCounts = {};
            for (const p of parsed) {
              const key = p.type || 'other';
              typeCounts[key] = (typeCounts[key] || 0) + 1;
            }
            const typeSummary = Object.entries(typeCounts)
              .sort((a, b) => b[1] - a[1])
              .map(([k, v]) => `- ${k}: ${v}`)
              .join('\n');

            const commitList = commits
              .map((c) => {
                const sha = c.sha.slice(0, 7);
                const subject = (c.commit.message || '').split('\n')[0].trim();
                return `- ${sha} ${subject}`;
              })
              .join('\n');

            const generatedBody = [
              marker,
              '_Auto-generated from commit messages. Remove the marker to stop auto-updates on new commits._',
              '',
              '## Summary',
              `- Commit count: ${commits.length}`,
              `- Branch: \`${pr.head.ref}\``,
              '',
              '## Commit Types',
              typeSummary || '- other: 0',
              '',
              '## Commits',
              commitList,
              '',
              '## Validation',
              '- [ ] CI passed',
              '- [ ] Tested locally if needed',
              '',
              '## Notes',
              '- Add reviewer context here (what to focus on, known limitations, follow-ups).',
              ''
            ].join('\n');

            const existingTitle = (pr.title || '').trim();
            const existingBody = pr.body || '';
            const canReplaceBody = existingBody.trim().length === 0 || existingBody.includes(marker);
            const canReplaceTitle =
              existingTitle.length === 0 ||
              existingTitle === pr.head.ref ||
              existingTitle.toLowerCase().startsWith('wip') ||
              existingTitle.includes('[auto]');

            const update = {};
            if (canReplaceTitle) {
              update.title = generatedTitle;
            }
            if (canReplaceBody) {
              update.body = generatedBody;
            }

            if (!update.title && !update.body) {
              core.info('Skipping update: PR title/body appear manually managed.');
              return;
            }

            await github.rest.pulls.update({
              owner,
              repo,
              pull_number: pr.number,
              ...update
            });

            core.info('PR metadata updated from commit messages.');
